<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <!-- Left Green Gradient -->
    <linearGradient id="logoGreenGrad" gradientUnits="userSpaceOnUse" x1="75" y1="36" x2="250" y2="505">
      <stop offset="0%" stop-color="#3EE075" />
      <stop offset="100%" stop-color="#0B9F5B" />
    </linearGradient>
    
    <!-- Right Blue Gradient -->
    <linearGradient id="logoBlueGrad" gradientUnits="userSpaceOnUse" x1="262" y1="36" x2="482" y2="476">
      <stop offset="0%" stop-color="#0F3268" />
      <stop offset="100%" stop-color="#061224" />
    </linearGradient>
  </defs>

  <!-- Left Speech Bubble Side -->
  <path d="M 250,36 A 220,220 0 0,0 120,410 C 90,450 70,480 75,505 C 80,515 110,480 170,456 A 220,220 0 0,0 250,476 Z" fill="url(#logoGreenGrad)" />

  <!-- Right Brain Side -->
  <path d="M 262,36 A 220,220 0 0,1 262,476 Z" fill="url(#logoBlueGrad)" />

  <!-- Left Circuit Traces -->
  <g stroke="#FFFFFF" stroke-width="12" stroke-linecap="round" fill="none">
    <!-- Top trace -->
    <path d="M 240,190 L 220,190 L 183,153" />
    <!-- Upper-mid trace -->
    <path d="M 240,240 L 170,240 L 150,220" />
    <!-- Lower-mid trace -->
    <path d="M 240,272 L 170,272 L 150,292" />
    <!-- Bottom trace -->
    <path d="M 240,322 L 220,322 L 183,359" />
  </g>

  <!-- Left Circles -->
  <g stroke="#FFFFFF" stroke-width="10" fill="url(#logoGreenGrad)">
    <circle cx="170" cy="140" r="15" />
    <circle cx="130" cy="220" r="15" />
    <circle cx="130" cy="292" r="15" />
    <circle cx="170" cy="372" r="15" />
  </g>

  <!-- Right Circuit Traces -->
  <g stroke="#00D2FF" stroke-width="12" stroke-linecap="round" fill="none">
    <!-- Top trace -->
    <path d="M 272,190 L 292,190 L 329,153" />
    <!-- Upper-mid trace -->
    <path d="M 272,240 L 342,240 L 362,220" />
    <!-- Lower-mid trace -->
    <path d="M 272,272 L 342,272 L 362,292" />
    <!-- Bottom trace -->
    <path d="M 272,322 L 292,322 L 329,359" />
  </g>

  <!-- Right Circles -->
  <g stroke="#00D2FF" stroke-width="10" fill="url(#logoBlueGrad)">
    <circle cx="342" cy="140" r="15" />
    <circle cx="382" cy="220" r="15" />
    <circle cx="382" cy="292" r="15" />
    <circle cx="342" cy="372" r="15" />
  </g>
</svg>
